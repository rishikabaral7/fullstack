<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body
    class="w-full h-screen flex justify-center md:h-screen items-center  bg-[url('./img/photo.png')] md:bg-none  bg-cover bg-no-repeat ">

    <div class="hidden md:block md:w-[50%]">
        <img class="hidden md:block  md:h-[700px] lg:h-full md:w-full xl:h-screen" src="./img/photo.png" alt="">
    </div>
    <div class=" md:w-[50%] xl:flex xl:justify-center xl:items-center xl:w-full ">


        <form action="submit" class="text-blue-300 ">
            
            <div class=" w-80 md:w-[500px] bg-[#fff] flex flex-col  justify-center items-center gap-4 py-10 md:px-20 h-[600px]">
                <h2 class=" text-3xl font-extrabold text-center mb-4 xl:text-5xl">Sign Up</h2>
                <div class="flex flex-col md:flex-row gap-4 md:gap-1">

                    <div class="relative px-10 md:px-0">
                        <input class="peer w-60 md:w-40   py-2 border-2 border-blue-300 focus:outline-none rounded-xl"
                            type="name" name="firstname" placeholder="">
                        <label
                            class="absolute left-12 top-2 md:left-4 text-blue-300 peer-focus:-top-3 peer-focus:left-14 md:peer-focus:left-4 peer-focus:bg-[#fff] pointer-events-none">First
                            Name</label>
                    </div>
                    <div class="relative px-10 md:px-0">
                        <input class="peer w-60 md:w-40 py-2  border-2 border-blue-300 focus:outline-none rounded-xl"
                            type="name" name="lastname" placeholder="">
                        <label
                            class="absolute left-12 top-2 md:left-4 text-blue-300 peer-focus:-top-3 md:peer-focus:left-4 peer-focus:left-14 peer-focus:bg-[#fff] pointer-events-none">Last
                            Name</label>
                    </div>


                </div>
                <div class="relative px-10 md:px-0">
                    <input class="peer w-60 md:w-80 py-2 border-2 border-blue-300 focus:outline-none rounded-xl"
                        type="email" name="email" placeholder="">
                    <label
                        class="absolute left-12 md:left-4 top-2 text-blue-300 peer-focus:-top-3 peer-focus:left-14 peer-focus:bg-[#fff]  md:peer-focus:left-4  pointer-events-none">Email</label>
                </div>
                <div class="relative px-10 md:px-0">
                    <input class="peer w-60 md:w-80 py-2 border-2 border-blue-300 focus:outline-none rounded-xl"
                        type="password" name="password" placeholder="">
                    <label
                        class="absolute left-12 md:left-4 top-2 text-blue-300 peer-focus:-top-3 peer-focus:left-14 peer-focus:bg-[#fff]  md:peer-focus:left-4 pointer-events-none ">Password</label>
                </div>
                <div class="relative px-10 md:px-0">
                    <input class="peer w-60 md:w-80 py-2 border-2 border-blue-300 focus:outline-none rounded-xl"
                        type="passsword" name="confirmpassword" placeholder="">
                    <label
                        class="absolute left-12 md:left-4 top-2 text-blue-300 peer-focus:-top-3 peer-focus:left-14 peer-focus:bg-[#fff]  md:peer-focus:left-4 pointer-events-none ">Confirm
                        Password</label>
                </div>
                <div class='flex gap-2 justify-start w-full px-10 md:px-3'>

                    <input type="checkbox" class="border-blue-300 outline-none">
                    <label for="checkbox">I Agree with privacy and policy </label>
                </div>
                <button type="submit" class="bg-blue-300 text-white px-9 py-2 font-bold rounded-xl">Sign Up</button>
        </form>

        <div>
            <p>Already have an account? <a href="./index.html" class="text-red-400">Sign In</a></p>
        </div>
    </div>
    </div>

</body>

</html>
